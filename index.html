<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipMaker</title>
  </head>
  <body>
    <h1>ClipMaker</h1>

    <button id="upload_widget" class="cloudinary-button">Upload files</button>

    <script
      src="https://upload-widget.cloudinary.com/latest/global/all.js"
      type="text/javascript"
    ></script>

    <script type="text/javascript">

        
        const app = {
            transcriptionUrl: '',
            public_id: '',
            waitForTranscription: async () => {

                const maxAttempts = 30;
                const delay = 2000; // 2 seconds

                for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                    const url = `https://res.cloudinary.com/${config.cloudName}/raw/upload/v${Date.now()}/${app.public_id}.transcript`;

                    try {

                        console.log(`Tentativa ${attempt}/${maxAttempts}: Verificando transcrição...`);
                        const response = await fetch(url);

                        if (response.ok) {
                            app.transcriptionUrl = url;
                            cosole.log('Transcrição disponível:', url);
                            return true
                        }

                    } catch (error) {
                        console.error(`Tentativa ${attempt} falhou:`, error.message);
                    }

                    if (attempt < maxAttempts) {
                        await new Promise(resolve => setTimeout(resolve, delay));

                    }
                }

                cosole.log('Transcrição não disponível após várias tentativas.');
                return false;

            },
            getTranscription: () => {},
            getViralMoment: () => {}
        }

        const config = {
            cloudName: 'drbmooarp',
            uploadPreset: 'upload_nlw'
        }

      const myWidget = cloudinary.createUploadWidget(
        config,
        (error, result) => {
          if (!error && result && result.event === "success") {
            console.log("Done! Here is the image info: ", result.info);
            app.public_id = result.info.public_id
          }
        },
      );

      document.getElementById("upload_widget").addEventListener(
        "click",
        function () {
          myWidget.open();
        },
        false,
      );
    </script>

  </body>
</html>
